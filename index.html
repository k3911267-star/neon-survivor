<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>NEON SURVIVOR</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#04040b;font-family:'Pretendard',sans-serif;cursor:crosshair;user-select:none}
  #c{display:block;position:fixed;inset:0}
  .vig{position:fixed;inset:0;pointer-events:none;background:radial-gradient(130% 130% at 50% 45%,transparent 48%,rgba(0,0,0,.7) 100%)}
  .ctrl{position:fixed;z-index:20;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.82);font-family:inherit;font-size:18px;width:46px;height:46px;border-radius:13px;cursor:pointer;backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center}
  .ctrl:active{background:rgba(255,255,255,.22)}
  #mute{top:14px;right:14px;display:flex}
  #pause{top:14px;right:70px}
  #bomb{bottom:26px;right:26px;width:80px;height:80px;font-size:30px;border-color:rgba(120,255,200,.45)}
  #bomb .n{position:absolute;top:-4px;right:-4px;background:#5effa0;color:#06241a;font-size:13px;font-weight:800;min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 4px}
  #joy{position:fixed;z-index:15;width:122px;height:122px;border-radius:50%;border:2px solid rgba(255,255,255,.22);background:rgba(255,255,255,.05);pointer-events:none;display:none;transform:translate(-50%,-50%)}
  #knob{position:absolute;left:50%;top:50%;width:54px;height:54px;border-radius:50%;background:rgba(120,235,255,.5);border:2px solid rgba(180,245,255,.85);transform:translate(-50%,-50%)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="vig"></div>
<button id="mute" class="ctrl">🔊</button>
<button id="pause" class="ctrl">⏸</button>
<button id="bomb" class="ctrl">💣<span class="n" id="bombN">2</span></button>
<div id="joy"><div id="knob"></div></div>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,DPR;
const mod=(v,m)=>((v%m)+m)%m, rnd=(a,b)=>a+Math.random()*(b-a);

/* ===== reactive grid ===== */
const grid={pts:[],cols:0,rows:0,S:0,
 init(){this.S=Math.max(46,(Math.min(W,H)/13)|0);const S=this.S;this.cols=Math.ceil(W/S)+3;this.rows=Math.ceil(H/S)+3;this.pts=[];for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++){const ox=(c-1)*S,oy=(r-1)*S;this.pts.push({ox,oy,x:ox,y:oy,vx:0,vy:0});}},
 i(c,r){return r*this.cols+c;},
 push(){},
 update(dt){const st=150,dm=Math.exp(-3.4*dt);for(const p of this.pts){p.vx=(p.vx+(p.ox-p.x)*st*dt)*dm;p.vy=(p.vy+(p.oy-p.y)*st*dt)*dm;p.x+=p.vx*dt;p.y+=p.vy*dt;}},
 draw(){const P=this.pts,co=this.cols,ro=this.rows;ctx.globalCompositeOperation='lighter';ctx.lineJoin='round';ctx.beginPath();for(let r=0;r<ro;r++)for(let c=0;c<co;c++){const pt=P[this.i(c,r)];if(c<co-1){const n=P[this.i(c+1,r)];ctx.moveTo(pt.x,pt.y);ctx.lineTo(n.x,n.y);}if(r<ro-1){const n=P[this.i(c,r+1)];ctx.moveTo(pt.x,pt.y);ctx.lineTo(n.x,n.y);}}ctx.strokeStyle='rgba(64,104,224,.18)';ctx.lineWidth=2.6;ctx.stroke();ctx.strokeStyle='rgba(120,170,255,.42)';ctx.lineWidth=1;ctx.stroke();ctx.globalCompositeOperation='source-over';}};
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);grid.init();}
addEventListener('resize',resize);resize();

/* ===== glow ===== */
const gc={};
function gsprite(c){const k=c[0]+'_'+c[1]+'_'+c[2];if(gc[k])return gc[k];const s=document.createElement('canvas');s.width=s.height=64;const g=s.getContext('2d');const r=g.createRadialGradient(32,32,0,32,32,32);r.addColorStop(0,'rgba('+c[0]+','+c[1]+','+c[2]+',1)');r.addColorStop(.4,'rgba('+c[0]+','+c[1]+','+c[2]+',.4)');r.addColorStop(1,'rgba('+c[0]+','+c[1]+','+c[2]+',0)');g.fillStyle=r;g.fillRect(0,0,64,64);gc[k]=s;return s;}
function glow(x,y,rad,c,a){ctx.globalAlpha=a==null?1:a;ctx.drawImage(gsprite(c),x-rad,y-rad,rad*2,rad*2);ctx.globalAlpha=1;}
function core(x,y,rad,c){ctx.fillStyle='rgb('+c[0]+','+c[1]+','+c[2]+')';ctx.beginPath();ctx.arc(x,y,rad,0,6.283);ctx.fill();}

/* ===== audio ===== */
let actx,muted=false,music=null;
function initAudio(){if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(actx&&actx.state==='suspended')actx.resume();}
function beep(f,d,t,v){if(!actx||muted)return;t=t||'square';v=v==null?.18:v;const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(actx.destination);const n=actx.currentTime;g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(.0001,n+d);o.start(n);o.stop(n+d);}
function noise(d,v){if(!actx||muted)return;v=v==null?.2:v;const L=Math.floor(actx.sampleRate*d),b=actx.createBuffer(1,L,actx.sampleRate),dt=b.getChannelData(0);for(let i=0;i<L;i++)dt[i]=(Math.random()*2-1)*(1-i/L);const s=actx.createBufferSource();s.buffer=b;const g=actx.createGain();g.gain.value=v;s.connect(g);g.connect(actx.destination);s.start();}
const sfx={shoot:()=>beep(800+Math.random()*70,.04,'square',.03),hit:()=>beep(250,.04,'square',.04),boom:()=>{noise(.18,.14);beep(110,.22,'sawtooth',.09);},hurt:()=>{beep(80,.3,'sawtooth',.22);noise(.12,.16);},lvl:()=>{beep(660,.08,'square',.12);setTimeout(()=>beep(990,.1,'square',.12),90);},heal:()=>{beep(520,.1,'sine',.13);setTimeout(()=>beep(800,.12,'sine',.13),90);},pick:()=>{beep(700,.07,'triangle',.12);setTimeout(()=>beep(1050,.09,'triangle',.12),70);},bomb:()=>{noise(.5,.28);beep(60,.5,'sawtooth',.2);},bossfire:()=>beep(180,.07,'sawtooth',.05),bossdie:()=>{noise(.7,.3);beep(70,.8,'sawtooth',.22);}};
function startMusic(){if(!actx||music)return;try{const o1=actx.createOscillator(),o2=actx.createOscillator(),o3=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();o1.type='sawtooth';o2.type='sawtooth';o3.type='sine';o1.frequency.value=55;o2.frequency.value=55;o2.detune.value=9;o3.frequency.value=110;f.type='lowpass';f.frequency.value=380;f.Q.value=6;g.gain.value=0;o1.connect(f);o2.connect(f);o3.connect(f);f.connect(g);g.connect(actx.destination);o1.start();o2.start();o3.start();g.gain.linearRampToValueAtTime(muted?0:.045,actx.currentTime+2.5);music={o1,o2,o3,g,f};}catch(e){}}
function stopMusic(){if(!music)return;const m=music;try{m.g.gain.cancelScheduledValues(actx.currentTime);m.g.gain.linearRampToValueAtTime(.0001,actx.currentTime+.6);setTimeout(()=>{try{m.o1.stop();m.o2.stop();m.o3.stop();}catch(e){}},700);}catch(e){}music=null;}
document.getElementById('mute').addEventListener('click',function(e){e.stopPropagation();muted=!muted;this.textContent=muted?'🔇':'🔊';if(music)music.g.gain.value=muted?0:.045;});

/* ===== colors / weapons ===== */
const C={player:[90,235,255],bul:[190,250,255],grunt:[255,75,185],fast:[255,180,65],tank:[180,110,255],shooter:[80,230,190],split:[255,140,80],boss:[255,70,90],ebul:[255,120,90],heal:[95,255,155],bomb:[120,255,200],shield:[120,220,255],wShot:[255,180,65],wLaser:[200,120,255],wHome:[120,255,150]};
const SIDES={grunt:4,fast:3,tank:6,shooter:5,split:4};
const WEAPON_KEYS=['pulse','shotgun','laser','homing'];
const WEAPONS={
 pulse:{name:'펄스',en:'PULSE',c:C.bul,sdesc:'전방을 넓게 커버',desc:'가장 무난한 기본 무기. 레벨업할수록 탄이 여러 갈래로 늘어나 전방을 넓게 커버해요.'},
 shotgun:{name:'샷건',en:'SHOTGUN',c:C.wShot,sdesc:'근접 산탄으로 쓸기',desc:'넓게 퍼지는 산탄. 근접에서 몰려오는 적을 한 번에 쓸어버리는 데 강해요.'},
 laser:{name:'레이저',en:'LASER',c:C.wLaser,sdesc:'적을 관통하는 고속탄',desc:'적을 관통하는 고속탄. 일렬로 늘어선 적과 탱커·보스에게 특히 강력해요.'},
 homing:{name:'호밍',en:'HOMING',c:C.wHome,sdesc:'자동 추적 미사일',desc:'적을 자동으로 따라가는 추적 미사일. 흩어진 적과 보스 상대가 편해요.'}};
function wstats(w,l){
 if(w==='shotgun')return{n:6+l,spread:.9,sp:560,iv:Math.max(.34,.5-l*.025),dmg:1,pierce:false,homing:false,life:.34,col:C.wShot};
 if(w==='laser')return{n:1+((l/3)|0),spread:.1,sp:1050,iv:Math.max(.1,.16-l*.01),dmg:1+((l/3)|0),pierce:true,homing:false,life:null,col:C.wLaser};
 if(w==='homing')return{n:1+((l/2)|0),spread:.5,sp:380,iv:Math.max(.18,.3-l*.02),dmg:1,pierce:false,homing:true,life:2.4,col:C.wHome};
 return{n:Math.min(6,l),spread:.16,sp:660,iv:Math.max(.085,.2-l*.013),dmg:1,pierce:false,homing:false,life:null,col:C.bul};
}

/* ===== state ===== */
let state='menu',best=0;
let player,bullets,enemies,ebullets,boss,parts,floats,pickups,shocks,sky,decor;
let elapsed,score,kills,combo,comboT,comboMax,level,spawnT,pickupT,bossTimer,bossesKilled,shake,shX,shY,pointer,moveVec,clock,last,flash,dmgFlash,hitStop,comboPop,bossBanner,eid,newRec,zoom;
let isTouch=false,chosenWeapon='pulse',selRects=[],hoverSel=-1;
const pauseBtn=document.getElementById('pause'),bombBtn=document.getElementById('bomb'),bombN=document.getElementById('bombN'),joyEl=document.getElementById('joy'),knobEl=document.getElementById('knob');

function initSky(){sky={neb:[],stars:[]};const nc=[[70,80,230],[230,70,180],[60,200,200]];for(let i=0;i<3;i++)sky.neb.push({bx:Math.random()*W,by:Math.random()*H,r:rnd(260,400),c:nc[i],ph:Math.random()*6.283});for(let i=0;i<40;i++)sky.stars.push({x:Math.random()*W,y:Math.random()*H,z:rnd(.2,.9)});}
function reset(){
 player={x:W/2,y:H/2,r:14,hp:100,maxHp:100,fireT:0,inv:0,trail:[],weapon:'pulse',bombs:2,shieldT:0,aim:-1.5708};
 bullets=[];enemies=[];ebullets=[];boss=null;parts=[];floats=[];pickups=[];shocks=[];
 elapsed=0;score=0;kills=0;combo=0;comboT=0;comboMax=0;level=1;spawnT=.6;pickupT=8;bossTimer=42;bossesKilled=0;
 shake=0;shX=0;shY=0;moveVec={x:0,y:0};flash=0;dmgFlash=0;hitStop=0;comboPop=0;bossBanner=0;eid=0;newRec=false;zoom=1;
 pointer={x:W/2,y:H/2};bombN.textContent=2;
 if(!sky)initSky();
 if(!decor){decor=[];const t=['grunt','fast','tank','shooter'];for(let i=0;i<8;i++)decor.push({x:Math.random()*W,y:Math.random()*H,vx:rnd(-28,28),vy:rnd(-28,28),r:rnd(9,20),rot:Math.random()*6.283,spin:rnd(-1.5,1.5),c:C[t[i%4]],sides:SIDES[t[i%4]]});}
}
function syncControls(){const pl=(state==='play'||state==='paused');pauseBtn.style.display=pl?'flex':'none';bombBtn.style.display=(pl&&isTouch)?'flex':'none';if(!pl){hideJoy();moveVec.x=0;moveVec.y=0;}}
function setState(s){state=s;syncControls();}
function startGame(){initAudio();reset();player.weapon=chosenWeapon;startMusic();setState('play');}

/* ===== input ===== */
function inSel(x,y){for(let i=0;i<selRects.length;i++){const r=selRects[i];if(x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h)return i;}return -1;}
function handlePress(x,y){
 if(state==='select'){const i=inSel(x,y);if(i>=0){chosenWeapon=WEAPON_KEYS[i];startGame();}return;}
 if(state==='menu'||state==='over'){setState('select');return;}
 if(state==='paused'){setState('play');return;}
}
addEventListener('mousemove',e=>{pointer.x=e.clientX;pointer.y=e.clientY;if(state==='select')hoverSel=inSel(e.clientX,e.clientY);});
addEventListener('mousedown',e=>{if(e.target.closest('.ctrl'))return;if(state==='play')return;handlePress(e.clientX,e.clientY);});
addEventListener('keydown',e=>{
 if(state==='play'){if(e.key===' '||e.key==='Enter'||e.key==='b'||e.key==='B')useBomb();if(e.key==='p'||e.key==='P'||e.key==='Escape')setState('paused');return;}
 if(state==='paused'){if(e.key==='p'||e.key==='P'||e.key==='Escape'||e.key===' '||e.key==='Enter')setState('play');return;}
 if(state==='select'){const n='1234'.indexOf(e.key);if(n>=0){chosenWeapon=WEAPON_KEYS[n];startGame();}return;}
 if(e.key===' '||e.key==='Enter'||e.key==='r'||e.key==='R')setState('select');
});
let joyId=null,joyBase={x:0,y:0};
function showJoy(x,y){joyBase.x=x;joyBase.y=y;joyEl.style.left=x+'px';joyEl.style.top=y+'px';joyEl.style.display='block';knobEl.style.left='50%';knobEl.style.top='50%';}
function hideJoy(){joyEl.style.display='none';joyId=null;}
addEventListener('touchstart',e=>{if(!isTouch){isTouch=true;syncControls();}if(e.target.closest('.ctrl'))return;const t=e.changedTouches[0];if(state==='play'){if(joyId===null){joyId=t.identifier;showJoy(t.clientX,t.clientY);moveVec.x=0;moveVec.y=0;}return;}handlePress(t.clientX,t.clientY);},{passive:true});
addEventListener('touchmove',e=>{if(joyId===null)return;for(const t of e.changedTouches){if(t.identifier===joyId){let dx=t.clientX-joyBase.x,dy=t.clientY-joyBase.y,d=Math.hypot(dx,dy),mr=52;if(d>mr){dx*=mr/d;dy*=mr/d;}knobEl.style.left=(50+dx/122*100)+'%';knobEl.style.top=(50+dy/122*100)+'%';moveVec.x=dx/mr;moveVec.y=dy/mr;}}},{passive:true});
function endTouch(e){for(const t of e.changedTouches){if(t.identifier===joyId){hideJoy();moveVec.x=0;moveVec.y=0;}}}
addEventListener('touchend',endTouch);addEventListener('touchcancel',endTouch);
pauseBtn.addEventListener('click',e=>{e.stopPropagation();if(state==='play')setState('paused');else if(state==='paused')setState('play');});
bombBtn.addEventListener('click',e=>{e.stopPropagation();if(state==='play')useBomb();});

/* ===== helpers ===== */
function explode(x,y,c,n,sp){for(let i=0;i<n;i++){const a=Math.random()*6.283,s=rnd(sp*.3,sp);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(.3,.7),max:.7,r:rnd(2,4),c});}if(parts.length>680)parts.splice(0,parts.length-680);}
function burstFx(x,y,c,heavy){explode(x,y,c,heavy?30:14,280);const ns=heavy?12:5;for(let i=0;i<ns;i++){const a=Math.random()*6.283,s=rnd(200,heavy?520:380);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(.25,.5),max:.5,r:2,c,streak:true});}shocks.push({x,y,r:0,max:heavy?280:130,sp:heavy?1150:780,c});grid.push(x,y,heavy?grid.S*5:grid.S*3,heavy?1600:650);if(heavy)zoom=Math.max(zoom,1.03);}
function ftxt(x,y,t,c,big){floats.push({x,y,t,c,life:1,vy:-42,big:!!big});}
function nearest(x,y){let n=null,nd=1e9;for(const e of enemies){const d=(e.x-x)**2+(e.y-y)**2;if(d<nd){nd=d;n=e;}}if(boss&&!boss.entering){const d=(boss.x-x)**2+(boss.y-y)**2;if(d<nd){nd=d;n=boss;}}return n;}
function norm(a){while(a>Math.PI)a-=6.283;while(a<-Math.PI)a+=6.283;return a;}
function pickType(){const e=elapsed;let pool;if(e<12)return'grunt';else if(e<25)pool=[['grunt',3],['fast',2]];else if(e<40)pool=[['grunt',3],['fast',2],['tank',1],['shooter',1]];else pool=[['grunt',3],['fast',2],['tank',1],['shooter',1],['split',1]];let tot=0;for(const p of pool)tot+=p[1];let r=Math.random()*tot;for(const p of pool){r-=p[1];if(r<=0)return p[0];}return'grunt';}
function baseEnemy(x,y,type){let e={id:eid++,x,y,type,flash:0,born:0,rot:Math.random()*6.283,spin:rnd(-2,2),sides:SIDES[type]};
 if(type==='grunt'){e.r=12;e.hp=1+(elapsed/25|0);e.spd=rnd(60,80)+elapsed*1.1;e.val=10;e.c=C.grunt;}
 else if(type==='fast'){e.r=9;e.hp=1;e.spd=rnd(150,175)+elapsed*1.4;e.val=15;e.c=C.fast;}
 else if(type==='tank'){e.r=22;e.hp=5+(elapsed/14|0);e.spd=rnd(42,55)+elapsed*.4;e.val=45;e.c=C.tank;}
 else if(type==='shooter'){e.r=12;e.hp=2+(elapsed/30|0);e.spd=rnd(40,55)+elapsed*.35;e.val=25;e.c=C.shooter;e.fireT=rnd(1.6,2.6);}
 else{e.r=18;e.hp=3+(elapsed/20|0);e.spd=rnd(55,70)+elapsed*.5;e.val=35;e.c=C.split;}
 e.spd=Math.min(e.spd,type==='fast'?285:175);e.maxhp=e.hp;return e;}
function spawnEnemy(){const s=Math.floor(Math.random()*4);let x,y;if(s===0){x=rnd(0,W);y=-30;}else if(s===1){x=rnd(0,W);y=H+30;}else if(s===2){x=-30;y=rnd(0,H);}else{x=W+30;y=rnd(0,H);}enemies.push(baseEnemy(x,y,pickType()));}
function spawnMini(x,y){enemies.push({id:eid++,x,y,type:'grunt',flash:0,born:.25,rot:Math.random()*6.283,spin:rnd(-3,3),sides:4,r:8,hp:1,spd:rnd(120,150),val:6,c:C.grunt,maxhp:1});}
function spawnBoss(){boss={x:W/2,y:-100,r:48,maxhp:60+bossesKilled*45,spd:60,fireT:2.4,flash:0,entering:true,ty:H*0.22,pat:0,swing:Math.random()*6.283};boss.hp=boss.maxhp;bossBanner=2.4;sfx.boom();}
function bossFire(){const p=boss.hp/boss.maxhp,n=boss.x,m=boss.y;boss.pat=(boss.pat+1)%3;const mk=(a,sp,c)=>ebullets.push({x:n,y:m,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:7,dmg:12,c:c||C.ebul});if(boss.pat===0){const cnt=p<.5?16:11;for(let i=0;i<cnt;i++)mk(i/cnt*6.283+boss.swing,150+(p<.25?70:0));}else if(boss.pat===1){const a0=Math.atan2(player.y-m,player.x-n);for(let i=-2;i<=2;i++)mk(a0+i*.18,250);}else{for(let i=0;i<5;i++)mk(boss.swing+i*1.256,180,[255,90,200]);boss.swing+=.4;}if(p<.25){const a0=Math.atan2(player.y-m,player.x-n);mk(a0,300);}grid.push(n,m,grid.S*2,260);sfx.bossfire();}
function fire(){const tg=nearest(player.x,player.y);if(!tg)return;const base=Math.atan2(tg.y-player.y,tg.x-player.x);player.aim=base;const s=wstats(player.weapon,level);for(let i=0;i<s.n;i++){const a=base+(i-(s.n-1)/2)*s.spread*(s.n>1?1:0);bullets.push({x:player.x+Math.cos(a)*16,y:player.y+Math.sin(a)*16,vx:Math.cos(a)*s.sp,vy:Math.sin(a)*s.sp,r:player.weapon==='laser'?5:4,dmg:s.dmg,pierce:s.pierce,homing:s.homing,life:s.life,c:s.col,hit:s.pierce?[]:null});}explode(player.x+Math.cos(base)*16,player.y+Math.sin(base)*16,s.col,2,110);sfx.shoot();}

 text('💣 x'+player.bombs,20,134,13,'rgba(200,245,255,.85)','left',700);text('TIME '+elapsed.toFixed(1)+'s',W-126,32,15,'#fff','left',800);
 if(combo>1){const s=22+Math.min(combo,22)+Math.max(0,comboPop)*60;text('COMBO x'+combo,W/2,H*0.15,s,'rgba(255,'+Math.max(80,255-combo*4)+',120,'+Math.min(1,comboT)+')','center',800);}
 if(boss){const p=boss.hp/boss.maxhp,bc=p<.25?'#ff50c8':p<.5?'#ff7850':'#ff5a72',w=Math.min(W*0.6,520),x=W/2-w/2,y=58;text('⚠ BOSS',W/2,y-8,15,'rgba(255,120,140,.95)','center',800);ctx.fillStyle='rgba(255,255,255,.12)';rrect(x,y,w,12,6);ctx.fill();ctx.fillStyle=bc;rrect(x,y,w*Math.max(0,p),12,6);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;for(let i=1;i<8;i++){ctx.beginPath();ctx.moveTo(x+w/8*i,y);ctx.lineTo(x+w/8*i,y+12);ctx.stroke();}}
 if(bossBanner>0)text('⚠  BOSS APPROACHING  ⚠',W/2,H*0.4,Math.min(34,W*0.07),'rgba(255,90,110,'+Math.min(1,bossBanner)+')','center',900);}
function bgDraw(){ctx.globalCompositeOperation='source-over';ctx.fillStyle='#04040b';ctx.fillRect(0,0,W,H);ctx.globalCompositeOperation='lighter';for(const nb of sky.neb){const x=nb.bx+Math.sin(clock*.07+nb.ph)*40,y=nb.by+Math.cos(clock*.06+nb.ph)*30;glow(x,y,nb.r,nb.c,.07);}for(const st of sky.stars){ctx.fillStyle='rgba(190,205,255,'+(.25+st.z*.5)*.6+')';ctx.fillRect(st.x,st.y,st.z*2,st.z*2);}ctx.globalCompositeOperation='source-over';}
function center(t,y,s,c,w){text(t,W/2,y,s,c,'center',w||800);}
function drawPreview(key,cx,cy){const wc=WEAPONS[key].c;ctx.save();ctx.globalCompositeOperation='lighter';if(key==='pulse'){for(let i=-2;i<=2;i++){const x=cx+i*9;glow(x,cy,9,wc,.9);core(x,cy,2.5,[240,252,255]);}}else if(key==='shotgun'){for(let i=-3;i<=3;i++){const a=-1.5708+i*.22,x=cx+Math.cos(a)*22,y=cy+Math.sin(a)*22;glow(x,y,8,wc,.9);core(x,y,2.2,[255,240,220]);}}else if(key==='laser'){ctx.strokeStyle='rgba('+wc[0]+','+wc[1]+','+wc[2]+',.95)';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cx,cy-22);ctx.lineTo(cx,cy+22);ctx.stroke();glow(cx,cy,16,wc,.6);}else{for(let i=0;i<7;i++){const a=i*.6-1.5,r=20-i*1.4,x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;glow(x,y,7,wc,.8);core(x,y,2,[235,255,240]);}}ctx.restore();}
function drawMenu(){ctx.globalCompositeOperation='lighter';for(const d of decor){d.x+=d.vx*.016;d.y+=d.vy*.016;d.rot+=d.spin*.016;if(d.x<-30)d.x=W+30;if(d.x>W+30)d.x=-30;if(d.y<-30)d.y=H+30;if(d.y>H+30)d.y=-30;grid.push(d.x,d.y,grid.S*1.3,26);neonPoly(d.x,d.y,d.r,d.sides,d.rot,d.c,false);}const oa=clock*.8,osx=W/2+Math.cos(oa)*Math.min(W,H)*.22,osy=H*0.36+Math.sin(oa)*Math.min(W,H)*.13;drawShip(osx,osy,oa+1.5708,14);ctx.globalCompositeOperation='source-over';ctx.fillStyle='rgba(4,4,11,.45)';ctx.fillRect(0,0,W,H);const bob=Math.sin(clock*1.6)*6,pulse=.7+Math.sin(clock*3)*.3;ctx.save();ctx.shadowColor='rgba(90,235,255,.95)';ctx.shadowBlur=36*pulse;center('NEON SURVIVOR',H*0.36+bob,Math.min(66,W*0.115),'#7fefff',900);ctx.restore();ctx.strokeStyle='rgba(127,239,255,.5)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W/2-110,H*0.39+bob);ctx.lineTo(W/2+110,H*0.39+bob);ctx.stroke();center('사방에서 몰려오는 적과 보스에 맞서 살아남으세요',H*0.45,Math.min(18,W*0.044),'rgba(255,255,255,.78)',600);const dev=isTouch?'조이스틱 이동 · 자동 발사 · 💣 폭탄 · ⏸ 일시정지':'마우스 이동 · 자동 발사 · Space/B 폭탄 · P 일시정지';center(dev,H*0.50,Math.min(15,W*0.037),'rgba(255,255,255,.5)',500);const b=.55+Math.sin(clock*4)*.45;center('▶  클릭 또는 터치 → 무기 선택',H*0.61,Math.min(25,W*0.056),'rgba(120,255,200,'+b+')',800);if(best>0)center('최고 점수  '+best.toLocaleString(),H*0.68,16,'rgba(255,255,255,.55)',600);center('제작 · 김민규(kmg09_)',H-26,13,'rgba(255,255,255,.42)',600);}
function drawSelect(){ctx.fillStyle='rgba(4,4,11,.66)';ctx.fillRect(0,0,W,H);const small=W<560;center('무기 선택',small?H*0.12:H*0.15,Math.min(44,W*0.1),'#7fefff',900);center('플레이 스타일에 맞는 무기를 고르세요',(small?H*0.12:H*0.15)+30,Math.min(15,W*0.038),'rgba(255,255,255,.65)',600);
 selRects=[];const cols=small?1:2,gap=14,areaW=Math.min(W-Math.max(28,W*0.08)*2,small?440:700),cw=(areaW-gap*(cols-1))/cols,ch=small?84:150,startX=W/2-areaW/2,startY=small?H*0.22:H*0.26;
 for(let i=0;i<4;i++){const cx=startX+(i%cols)*(cw+gap),cy=startY+Math.floor(i/cols)*(ch+gap),key=WEAPON_KEYS[i],wc=WEAPONS[key].c,hov=hoverSel===i;selRects.push({x:cx,y:cy,w:cw,h:ch,key});ctx.fillStyle=hov?'rgba(255,255,255,.09)':'rgba(255,255,255,.035)';rrect(cx,cy,cw,ch,15);ctx.fill();ctx.strokeStyle='rgba('+wc[0]+','+wc[1]+','+wc[2]+','+(hov?.95:.5)+')';ctx.lineWidth=hov?2.5:1.5;rrect(cx,cy,cw,ch,15);ctx.stroke();drawPreview(key,cx+(small?46:60),cy+ch/2);const tx=cx+(small?86:114);text(WEAPONS[key].name,tx,cy+(small?34:44),small?20:24,'rgb('+wc[0]+','+wc[1]+','+wc[2]+')','left',800);text(WEAPONS[key].en,tx+(small?72:100),cy+(small?33:42),small?12:13,'rgba(255,255,255,.4)','left',700);if(small)text(WEAPONS[key].sdesc,tx,cy+58,13,'rgba(255,255,255,.72)','left',600);else wrapText(WEAPONS[key].desc,tx,cy+72,cw-(tx-cx)-18,19,'rgba(255,255,255,.72)',14);}
 const hy=startY+Math.ceil(4/cols)*(ch+gap)+(small?14:20),b=.55+Math.sin(clock*4)*.45;center(small?'카드를 탭해서 시작':'카드를 클릭하거나 1~4 키로 선택',hy,Math.min(15,W*0.038),'rgba(120,255,200,'+b+')',600);center('제작 · 김민규(kmg09_)',H-22,12,'rgba(255,255,255,.4)',600);}
function drawPause(){ctx.fillStyle='rgba(4,4,11,.62)';ctx.fillRect(0,0,W,H);center('일시정지',H*0.44,Math.min(48,W*0.1),'#fff',800);const b=.55+Math.sin(clock*4)*.45;center('계속하려면 화면을 탭하거나 P 키',H*0.53,Math.min(17,W*0.042),'rgba(180,245,255,'+b+')',600);}
function rankOf(s){if(s>=15000)return['S','#ffd84e'];if(s>=8000)return['A','#7fffa0'];if(s>=4000)return['B','#7fd0ff'];if(s>=1500)return['C','#c9a0ff'];return['D','#ff9aa0'];}
function drawOver(){ctx.fillStyle='rgba(4,4,11,.72)';ctx.fillRect(0,0,W,H);const cw=Math.min(W*0.86,440),cx=W/2-cw/2,ch=336,cy=H/2-ch/2;ctx.save();ctx.shadowColor='rgba(255,90,120,.5)';ctx.shadowBlur=26;ctx.fillStyle='rgba(20,16,28,.74)';rrect(cx,cy,cw,ch,22);ctx.fill();ctx.restore();ctx.strokeStyle='rgba(255,90,120,.55)';ctx.lineWidth=1.5;rrect(cx,cy,cw,ch,22);ctx.stroke();ctx.save();ctx.shadowColor='rgba(255,90,120,.8)';ctx.shadowBlur=22;center('GAME OVER',cy+54,Math.min(44,W*0.088),'#ff6a86',900);ctx.restore();const rk=rankOf(score);ctx.save();ctx.shadowColor=rk[1];ctx.shadowBlur=28;text('RANK',cx+cw/2-86,cy+118,14,'rgba(255,255,255,.55)','center',700);text(rk[0],cx+cw/2-86,cy+166,52,rk[1],'center',900);ctx.restore();text('SCORE',cx+cw/2+52,cy+108,13,'rgba(255,255,255,.5)','center',600);text(score.toLocaleString(),cx+cw/2+52,cy+150,Math.min(40,W*0.085),'#fff','center',800);if(newRec){const b=.6+Math.sin(clock*6)*.4;text('★ 신기록! ★',cx+cw/2+52,cy+176,15,'rgba(255,216,90,'+b+')','center',800);}center('생존 '+elapsed.toFixed(1)+'초   처치 '+kills+'   콤보 x'+comboMax+'   보스 '+bossesKilled,cy+ch-78,13,'rgba(255,255,255,.66)','center',600);center('최고 점수  '+best.toLocaleString(),cy+ch-56,13,'rgba(255,255,255,.5)','center',600);const b2=.55+Math.sin(clock*4)*.45;center('↻  탭 · 클릭 · R → 무기 선택부터 다시',cy+ch-26,Math.min(16,W*0.04),'rgba(120,255,200,'+b2+')','center',800);center('제작 · 김민규(kmg09_)',cy+ch+26,12,'rgba(255,255,255,.4)',600);}
function render(){ctx.setTransform(DPR,0,0,DPR,0,0);bgDraw();const inGame=(state==='play'||state==='paused'||state==='over');ctx.save();ctx.translate(shX,shY);grid.draw();if(inGame){drawWorld();for(const f of floats){ctx.globalAlpha=Math.min(1,f.life);text(f.t,f.x,f.y,f.big?19:15,'rgb('+f.c[0]+','+f.c[1]+','+f.c[2]+')','center',800);ctx.globalAlpha=1;}}ctx.restore();if(dmgFlash>0){const g=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.3,W/2,H/2,Math.max(W,H)*.72);g.addColorStop(0,'rgba(255,40,40,0)');g.addColorStop(1,'rgba(255,30,30,'+dmgFlash*.55+')');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}if(flash>0){ctx.fillStyle='rgba(255,255,255,'+Math.min(.6,flash)*.6+')';ctx.fillRect(0,0,W,H);}if(inGame)hud();if(state==='menu')drawMenu();if(state==='select')drawSelect();if(state==='paused')drawPause();if(state==='over')drawOver();}

/* ===== loop ===== */
function loop(ts){if(!last)last=ts;let dt=(ts-last)/1000;last=ts;if(dt>.05)dt=.05;clock+=dt;grid.update(dt);zoom+=(1-zoom)*Math.min(1,dt*8);if(state==='play'){if(hitStop>0)hitStop-=dt;else update(dt);}render();requestAnimationFrame(loop);}
clock=0;reset();requestAnimationFrame(function(ts){last=ts;requestAnimationFrame(loop);});
</script>
